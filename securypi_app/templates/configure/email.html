{% extends 'base.html' %}

{% block site_content %}
<div class="configure">
  <header class="configure__email_title">
    <h1>{% block title %}Email / SMTP Configuration{% endblock %}</h1>
    <a class="distinguished_link" href="{{ url_for('configure.index') }}">&larr; Back to configure</a>
  </header>

  <section class="configure__email_form">
    <h2>SMTP server settings</h2>
    <form method="post">
      <input type="hidden" name="action" value="save_smtp">
      <ul class="account__info_list configure__email_list">
        <li class="account__info_list--item">
          <label for="smtp_host">SMTP host</label>
          <input class="my_form_input" type="text" id="smtp_host" name="smtp_host"
                 value="{{ email_config.smtp_host }}" placeholder="e.g. smtp.gmail.com">
        </li>
        <li class="account__info_list--item">
          <label for="smtp_port">SMTP port</label>
          <input class="my_form_input" type="number" id="smtp_port" name="smtp_port"
                 value="{{ email_config.smtp_port }}" placeholder="587">
        </li>
        <li class="account__info_list--item">
          <label for="smtp_username">Email address</label>
          <input class="my_form_input" type="text" id="smtp_username" name="smtp_username"
                 value="{{ email_config.smtp_username }}" placeholder="sender@example.com">
        </li>
        <li class="account__info_list--item">
          <label for="smtp_password">Password</label>
          <input class="my_form_input" type="password" id="smtp_password" name="smtp_password"
                 value="" placeholder="{% if email_config.smtp_password %}••••••••{% endif %}">
        </li>
        <li class="account__info_list--item">
          <label for="smtp_use_tls">Use TLS/SSL</label>
          <input class="checkbox_area" type="checkbox" id="smtp_use_tls" name="smtp_use_tls" value="1"
                 {% if email_config.smtp_use_tls %}checked{% endif %}>
        </li>
      </ul>
      <button class="button_submit button_mild_round configure__email--submit" type="submit">Save SMTP settings</button>
    </form>
  </section>

  <section class="configure__email_test">
    <h2>Send test email</h2>
    <form method="post" action="{{ url_for('configure.send_test_email') }}">
      <ul class="account__info_list configure__email_list">
        <li class="account__info_list--item">
          <label for="test_recipient">Recipient address</label>
          <input class="my_form_input" type="email" id="test_recipient" name="test_recipient"
                 placeholder="recipient@example.com">
        </li>
      </ul>
      <button class="button_submit button_mild_round configure__email--submit" type="submit">Send test email</button>
    </form>
  </section>
</div>
{% endblock %}
