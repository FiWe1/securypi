{% extends 'base.html' %}

{% block site_content %}
<div class="error">
  <h1>{% block title %}Error - Bad Request (400){% endblock %}</h1>
    <div class="error__body">
      <span>{{ error_description }}</span>
      <span>
        <a class="distinguished_link" href={{ url_for('index') }}>return home</a>
      </span>
    </div>
</div>
{% endblock %}
